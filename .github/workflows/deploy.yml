name: Build and Deploy

on:
  push:
    branches: [ master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push DJL Serving image
        run: |
          cd djl-serving
          docker build -t lilgoethe/djl-serving:latest .
          docker push lilgoethe/djl-serving:latest

      - name: Build and push Consumer image
        run: |
          docker build -t lilgoethe/djl-serving-consumer:latest .
          docker push lilgoethe/djl-serving-consumer:latest

      - name: Deploy to Azure Web App
        run: |
          curl -X POST "${{ secrets.AZURE_WEBHOOK_URL_SERVING }}"
